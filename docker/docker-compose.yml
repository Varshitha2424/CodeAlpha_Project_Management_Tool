version: '3.8'
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    volumes:
      - ../frontend/src:/app/src

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - '5000:5000'
    depends_on:
      - db
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=project_management
      - JWT_SECRET=supersecretkey
    volumes:
      - ../backend/src:/usr/src/app/src

  db:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: project_management
    volumes:
      - db_data:/var/lib/mysql

  analytics:
    build:
      context: ../python-services/analytics
      dockerfile: ../docker/Dockerfile.python
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend

  notifications:
    build:
      context: ../python-services/notifications
      dockerfile: ../docker/Dockerfile.python
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend

volumes:
  db_data:
